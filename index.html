<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Neon Pong × TikTok Live</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0a0a12;overflow:hidden;font-family:'Courier New',monospace}
    #root{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:.5rem;position:relative}

    /* HUD */
    #hud{display:flex;gap:.9rem;align-items:center;margin-bottom:.3rem;flex-wrap:wrap;justify-content:center}
    .hud-item{display:flex;flex-direction:column;align-items:center}
    .hud-label{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
    .hud-val{font-size:1.1rem;font-weight:500;color:#0ff;text-shadow:0 0 8px #0ff}
    #xp-bar-wrap{width:130px;height:5px;background:#1a1a2e;border-radius:3px;margin-top:3px;border:1px solid #0ff3}
    #xp-bar{height:100%;background:linear-gradient(90deg,#0ff,#f0f);border-radius:3px;transition:width .3s;width:0%}

    /* TikTok status */
    #tt-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #333;color:#555;transition:all .4s;margin-bottom:3px}
    #tt-status.live{border-color:#f06;color:#f06;text-shadow:0 0 6px #f06;box-shadow:0 0 10px #f062}
    #tt-dot{width:7px;height:7px;border-radius:50%;background:#333;transition:background .4s}
    #tt-status.live #tt-dot{background:#f06;box-shadow:0 0 6px #f06;animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    canvas{border:1px solid #0ff4;border-radius:6px;display:block;touch-action:none}

    /* Gift tier banner — full width, slides from top */
    #gift-banner{
      position:absolute;top:0;left:0;right:0;
      display:flex;align-items:center;justify-content:center;
      padding:10px 16px;font-size:15px;font-weight:bold;
      letter-spacing:1px;text-align:center;
      transform:translateY(-100%);transition:transform .35s cubic-bezier(.22,1,.36,1);
      z-index:30;border-bottom:1px solid transparent;
      pointer-events:none;
    }
    #gift-banner.show{transform:translateY(0)}
    #gift-banner.small {background:rgba(30,10,40,.95);color:#f9a;border-color:#f9a;text-shadow:0 0 10px #f9a}
    #gift-banner.medium{background:rgba(10,20,40,.95);color:#4af;border-color:#4af;text-shadow:0 0 10px #4af}
    #gift-banner.big   {background:rgba(40,10,0, .95);color:#f80;border-color:#f80;text-shadow:0 0 14px #f80}
    #gift-banner.mega  {background:rgba(20,20,0, .95);color:#fd0;border-color:#fd0;text-shadow:0 0 18px #fd0,0 0 40px #fd0}

    /* Side event feed */
    #event-feed{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:188px;display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:10}
    .evt-card{background:rgba(10,10,18,.88);border-left:3px solid #0ff;border-radius:4px;padding:5px 8px;font-size:11px;color:#ccc;animation:slideIn .3s ease,fadeOut .5s ease 3.5s forwards;max-width:188px;word-break:break-word}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fadeOut{to{opacity:0}}

    /* Big announce */
    #tt-announce{position:absolute;top:18%;left:50%;transform:translateX(-50%);font-size:19px;font-weight:bold;color:#fff;text-shadow:0 0 16px #f06,0 0 32px #f06;text-align:center;pointer-events:none;z-index:20;opacity:0;transition:opacity .3s;white-space:nowrap}
    #tt-announce.show{opacity:1}

    /* Fireball overlay label */
    #fireball-label{position:absolute;top:8px;right:20px;font-size:13px;color:#f80;text-shadow:0 0 10px #f80;letter-spacing:2px;opacity:0;transition:opacity .5s;pointer-events:none;z-index:15}
    #fireball-label.show{opacity:1}

    /* Golden paddle label */
    #golden-label{position:absolute;top:8px;left:20px;font-size:13px;color:#fd0;text-shadow:0 0 10px #fd0;letter-spacing:2px;opacity:0;transition:opacity .5s;pointer-events:none;z-index:15}
    #golden-label.show{opacity:1}

    #msg{margin-top:.4rem;font-size:12px;color:#0ff;text-shadow:0 0 6px #0ff;text-align:center;min-height:18px}
    #skins{display:flex;gap:7px;margin-top:4px;align-items:center}
    .skin-btn{width:24px;height:24px;border-radius:50%;border:2px solid #333;cursor:pointer;transition:border-color .2s}
    .skin-btn.active{border-color:#fff;box-shadow:0 0 8px #fff}
    .skin-btn.locked{opacity:.3;cursor:not-allowed;filter:grayscale(1)}
    #powerup-tray{display:flex;gap:6px;margin-top:3px;min-height:20px;align-items:center;flex-wrap:wrap;justify-content:center}
    .pu-badge{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid}
    #start-btn{margin-top:6px;padding:8px 30px;font-size:14px;font-weight:500;border:1px solid #0ff;border-radius:4px;background:transparent;color:#0ff;cursor:pointer;letter-spacing:2px;text-shadow:0 0 6px #0ff;box-shadow:0 0 12px #0ff3}
    #start-btn:hover{background:#0ff2}

    /* Gift tier legend */
    #tier-legend{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap;justify-content:center}
    .tier-pill{font-size:10px;padding:2px 9px;border-radius:12px;border:1px solid;letter-spacing:.5px}

    #touch-controls{display:none;gap:16px;margin-top:8px}
    .touch-btn{width:60px;height:60px;border-radius:50%;border:2px solid #0ff;background:rgba(0,255,255,.08);color:#0ff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
    .touch-btn:active{background:rgba(0,255,255,.22)}
    @media(max-width:700px){#touch-controls{display:flex}.hud-val{font-size:.95rem}}
  </style>
</head>
<body>
<div id="root">

  <!-- Gift banner -->
  <div id="gift-banner"></div>

  <!-- TikTok status -->
  <div id="tt-status"><div id="tt-dot"></div><span id="tt-label">TikTok: not connected</span></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-val" id="h-score">0</span></div>
    <div class="hud-item"><span class="hud-label">Best</span><span class="hud-val" id="h-best" style="color:#f0f;text-shadow:0 0 8px #f0f">0</span></div>
    <div class="hud-item"><span class="hud-label">Level</span><span class="hud-val" id="h-level" style="color:#ff0;text-shadow:0 0 8px #ff0">1</span></div>
    <div class="hud-item"><span class="hud-label">Lives</span><span class="hud-val" id="h-lives" style="color:#f44;text-shadow:0 0 8px #f44">❤❤❤</span></div>
    <div class="hud-item"><span class="hud-label">XP</span><div id="xp-bar-wrap"><div id="xp-bar"></div></div></div>
  </div>

  <!-- Canvas area -->
  <div style="position:relative;width:100%">
    <div id="event-feed"></div>
    <div id="tt-announce"></div>
    <div id="fireball-label">🔥 FIREBALL</div>
    <div id="golden-label">✨ GOLDEN PADDLE</div>
    <div style="display:flex;justify-content:center"><canvas id="canvas"></canvas></div>
  </div>

  <div id="powerup-tray"></div>
  <div id="msg">Press Start or Space to play</div>

  <!-- Gift tier legend -->
  <div id="tier-legend">
    <span class="tier-pill" style="color:#f9a;border-color:#f9a">🌸 1–99 coins → speed + sparks</span>
    <span class="tier-pill" style="color:#4af;border-color:#4af">🎆 100–999 → extra ball</span>
    <span class="tier-pill" style="color:#f80;border-color:#f80">🦁 1k–4.9k → fireball</span>
    <span class="tier-pill" style="color:#fd0;border-color:#fd0">🌌 5000+ → golden paddle</span>
  </div>

  <div id="skins"><span style="font-size:10px;color:#555;margin-right:4px">SKIN</span></div>
  <button id="start-btn">▶ START</button>

  <div id="touch-controls">
    <button class="touch-btn" id="btn-up">▲</button>
    <button class="touch-btn" id="btn-down">▼</button>
  </div>
</div>

<script>
// ── Canvas / sizing ────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas(){
  const maxW=Math.min(window.innerWidth-24,680);
  const maxH=Math.min(window.innerHeight-250,440);
  const ratio=680/420;
  let W=maxW,H=maxW/ratio;
  if(H>maxH){H=maxH;W=H*ratio;}
  canvas.width=Math.floor(W); canvas.height=Math.floor(H);
  canvas.style.width=canvas.width+'px'; canvas.style.height=canvas.height+'px';
}
resizeCanvas();
window.addEventListener('resize',()=>{resizeCanvas();if(!G.running)draw();});

const W      =()=>canvas.width;
const H      =()=>canvas.height;
const BALL_R =()=>Math.max(6,W()*.011);
const PAD_W  =()=>Math.max(10,W()*.017);
const MAX_PAD=()=>Math.max(60,H()*.21);
const MIN_PAD=()=>Math.max(20,H()*.07);

// ── Skins ──────────────────────────────────────────────────────────────
const SKINS=[
  {name:'Cyan',   color:'#0ff',   glow:'#0ff',   unlockLv:1},
  {name:'Magenta',color:'#f0f',   glow:'#f0f',   unlockLv:3},
  {name:'Gold',   color:'#ff0',   glow:'#ff0',   unlockLv:5},
  {name:'Inferno',color:'#ff4400',glow:'#ff2200',unlockLv:8},
  {name:'Ghost',  color:'#fff',   glow:'#aaf',   unlockLv:12},
];
let chosenSkin=0;

// ── Power-up types ─────────────────────────────────────────────────────
const POWERUP_TYPES=[
  {id:'big',  label:'BIG PAD',   color:'#0f8',glow:'#0f8',duration:8000},
  {id:'slow', label:'SLOW BALL', color:'#08f',glow:'#08f',duration:7000},
  {id:'multi',label:'MULTI BALL',color:'#f80',glow:'#f80',duration:6000},
];

// ── TikTok game state flags ────────────────────────────────────────────
let fireballActive  = false, fireballTimer  = null;
let goldenActive    = false, goldenTimer    = null;

// ── Viewer avatar system ───────────────────────────────────────────────
// Avatars drift slowly around the outside border of the arena.
// Each avatar: { username, initials, color, img(Image|null),
//   side(0=top,1=right,2=bottom,3=left), pos(0–1 along that side),
//   speed, pulse, pulseDir, life, maxLife, highlight, highlightTimer }
const AVATAR_COLORS=['#0ff','#f0f','#ff0','#f80','#0f8','#f44','#4af','#fd0','#f9a','#8ff'];
const MAX_AVATARS = 28;
let avatars = [];

function makeAvatar(username, avatarUrl){
  const initials = username.replace(/[^a-zA-Z0-9]/g,'').slice(0,2).toUpperCase() || '??';
  const color    = AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];
  const side     = Math.floor(Math.random()*4);
  const av = {
    username, initials, color,
    img: null, imgLoaded: false,
    side, pos: Math.random(),
    speed: (Math.random()*0.0004+0.0001) * (Math.random()<.5?1:-1),
    pulse: Math.random()*Math.PI*2,
    pulseDir: 1,
    life: 1, maxLife: 1,
    highlight: false, highlightAlpha: 0,
    highlightTimer: null,
  };
  // Try to load real avatar image
  if(avatarUrl){
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{av.img=img;av.imgLoaded=true;};
    img.onerror=()=>{av.imgLoaded=false;};
    img.src=avatarUrl;
  }
  return av;
}

function addViewer(username, avatarUrl){
  // Don't duplicate
  if(avatars.find(a=>a.username===username)) return;
  // Evict oldest if full
  if(avatars.length>=MAX_AVATARS) avatars.shift();
  avatars.push(makeAvatar(username, avatarUrl));
}

function highlightAvatar(username){
  const av=avatars.find(a=>a.username===username);
  if(!av) return;
  av.highlight=true; av.highlightAlpha=1;
  clearTimeout(av.highlightTimer);
  av.highlightTimer=setTimeout(()=>{av.highlight=false;},2500);
}

// Convert side+pos to canvas x,y (on the border, outside the arena)
function avatarPos(av){
  const R=14; // avatar radius
  const pad=R+2;
  const w=W(), h=H();
  switch(av.side){
    case 0: return {x: pad+(w-pad*2)*av.pos,    y: -R-2};          // top
    case 1: return {x: w+R+2,                    y: pad+(h-pad*2)*av.pos}; // right
    case 2: return {x: pad+(w-pad*2)*(1-av.pos), y: h+R+2};        // bottom
    case 3: return {x: -R-2,                      y: pad+(h-pad*2)*(1-av.pos)}; // left
  }
}

function updateAvatars(){
  avatars.forEach(av=>{
    av.pos+=av.speed;
    if(av.pos>1){av.pos=1;av.speed*=-1;}
    if(av.pos<0){av.pos=0;av.speed*=-1;}
    av.pulse+=0.04;
    if(av.highlight&&av.highlightAlpha>0) av.highlightAlpha=Math.max(0,av.highlightAlpha-0.012);
  });
}

function drawAvatars(){
  const R=13;
  avatars.forEach(av=>{
    const {x,y}=avatarPos(av);
    const pulse=0.85+0.15*Math.sin(av.pulse);

    ctx.save();
    ctx.translate(x,y);

    // Highlight ring (gift/event glow)
    if(av.highlight&&av.highlightAlpha>0){
      ctx.globalAlpha=av.highlightAlpha*0.9;
      ctx.shadowColor=av.color; ctx.shadowBlur=18;
      ctx.strokeStyle=av.color; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,R+4,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }

    // Outer glow ring (always, subtle)
    ctx.globalAlpha=0.35*pulse;
    ctx.shadowColor=av.color; ctx.shadowBlur=10;
    ctx.strokeStyle=av.color; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,R+1,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // Clip circle
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.clip();

    // Avatar image or initials fallback
    if(av.imgLoaded&&av.img){
      try{ ctx.drawImage(av.img,-R,-R,R*2,R*2); }
      catch(e){ drawInitials(av,R); }
    } else {
      drawInitials(av,R);
    }

    ctx.restore();

    // Username tooltip below avatar (small, fades at edges)
    const edgeFade=Math.min(av.pos,1-av.pos)*8;
    ctx.globalAlpha=Math.min(1,edgeFade)*0.75;
    ctx.fillStyle=av.color;
    ctx.font=`bold 8px monospace`;
    ctx.textAlign='center';
    ctx.fillText('@'+av.username.slice(0,10), x, y+R+10);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  });
}

function drawInitials(av,R){
  // Background
  ctx.fillStyle='#0a0a18';
  ctx.fillRect(-R,-R,R*2,R*2);
  // Coloured tint
  ctx.fillStyle=av.color+'33';
  ctx.fillRect(-R,-R,R*2,R*2);
  // Initials
  ctx.fillStyle=av.color;
  ctx.font=`bold ${Math.floor(R*.85)}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(av.initials,0,1);
  ctx.textBaseline='alphabetic';
}

// Seed some demo avatars so the arena looks populated from the start
function seedDemoAvatars(){
  const demos=['Spectator1','NeonFan','PongKing','TikUser','WatcherX',
               'LiveViewer','GiftSender','ProGamer','NightOwl','PixelFan',
               'Streamer99','ArcadeKid','RetroPlay','NeonLight','CyberWave'];
  demos.forEach((n,i)=>{
    const av=makeAvatar(n,null);
    av.side=i%4; av.pos=(i/demos.length+Math.random()*.1)%1;
    avatars.push(av);
  });
}

// ── Game state ─────────────────────────────────────────────────────────
let best=0,G={},lastTime=0;

function mkBall(x,y,vx,vy){return{x,y,vx,vy,ay:0,spin:0,trail:[]};}

function reset(){
  if(fireballTimer)  clearTimeout(fireballTimer);
  if(goldenTimer)    clearTimeout(goldenTimer);
  fireballActive=false; goldenActive=false;
  document.getElementById('fireball-label').classList.remove('show');
  document.getElementById('golden-label').classList.remove('show');
  G={
    running:false,score:0,lives:3,level:1,
    xp:0,xpNeeded:100,
    padH:MAX_PAD(),paddleY:H()/2-MAX_PAD()/2,paddleVY:0,
    balls:[mkBall(W()/2,H()/2,-5,3.5)],
    bricks:[],particles:[],powerups:[],activePU:{},
    shakeX:0,shakeY:0,shakeDur:0,
    hitFlash:0,animId:null,
    ttBurst:[],ttFlashColor:null,ttFlashAlpha:0,
  };
  buildBricks();
}

// ── Bricks ─────────────────────────────────────────────────────────────
function buildBricks(){
  G.bricks=[];
  const cols=7,rows=3;
  const bw=Math.floor((W()*.35)/cols-4);
  const bh=Math.floor(H()*.045);
  const gap=4;
  const startX=W()-14-cols*(bw+gap);
  const startY=Math.floor(H()*.08);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const hp=rows-r;
    G.bricks.push({x:startX+c*(bw+gap),y:startY+r*(bh+gap),w:bw,h:bh,hp,maxHp:hp});
  }
}

// ── Power-up helpers ───────────────────────────────────────────────────
function spawnPowerup(x,y){
  if(Math.random()>.30) return;
  const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  G.powerups.push({x,y,vy:1.2,t,r:9});
}
function applyPowerup(t){
  const prev=G.activePU[t.id];
  if(prev) clearTimeout(prev.timer);
  if(t.id==='big')  G.padH=Math.min(MAX_PAD()*1.7,G.padH+MAX_PAD()*.5);
  if(t.id==='slow') G.balls.forEach(b=>{b.vx*=.55;b.vy*=.55;});
  if(t.id==='multi') spawnExtraBalls(2);
  const timer=setTimeout(()=>{
    if(t.id==='big') G.padH=Math.max(MIN_PAD(),G.padH-MAX_PAD()*.5);
    delete G.activePU[t.id]; renderPUTray();
  },t.duration);
  G.activePU[t.id]={timer,t}; renderPUTray();
}
function spawnExtraBalls(n=2){
  const o=G.balls[0]||mkBall(W()/2,H()/2,-5,3);
  for(let i=0;i<n;i++){
    const angle=(Math.random()-.5)*1.2,spd=Math.abs(o.vx)+1;
    G.balls.push(mkBall(o.x,o.y,-spd*Math.cos(angle),spd*Math.sin(angle)+(Math.random()-.5)*3));
  }
}
function renderPUTray(){
  document.getElementById('powerup-tray').innerHTML=
    Object.values(G.activePU).map(a=>
      `<span class="pu-badge" style="color:${a.t.color};border-color:${a.t.color};text-shadow:0 0 6px ${a.t.glow}">${a.t.label}</span>`
    ).join('');
}

// ── XP / level ─────────────────────────────────────────────────────────
function addXP(amt){
  G.xp+=amt;
  while(G.xp>=G.xpNeeded){
    G.xp-=G.xpNeeded;G.level++;G.xpNeeded=Math.round(G.xpNeeded*1.3);
    document.getElementById('h-level').textContent=G.level;
    flashMsg(`LEVEL UP!  LV${G.level}`); buildBricks(); renderSkins();
  }
  document.getElementById('xp-bar').style.width=Math.min(100,(G.xp/G.xpNeeded)*100)+'%';
}

// ── Particles ──────────────────────────────────────────────────────────
function spawnParticles(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*4+1;
    G.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color});
  }
}
function shake(mag=6,dur=12){G.shakeX=mag;G.shakeY=mag;G.shakeDur=dur;}
function screenExplosion(color='#f06'){
  G.ttFlashColor=color;G.ttFlashAlpha=.55;shake(14,22);
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*8+2;
    G.ttBurst.push({x:W()/2,y:H()/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color,size:Math.random()*6+3});
  }
}

// ── Gift banner UI ─────────────────────────────────────────────────────
let bannerTimer=null;
function showGiftBanner(tier,text){
  const el=document.getElementById('gift-banner');
  el.className='gift-banner show '+tier;
  el.textContent=text;
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

function addEventCard(icon,text,borderColor='#0ff'){
  const feed=document.getElementById('event-feed');
  const card=document.createElement('div');
  card.className='evt-card'; card.style.borderLeftColor=borderColor;
  card.innerHTML=`<span style="margin-right:4px">${icon}</span>${text}`;
  feed.appendChild(card);
  setTimeout(()=>card.remove(),4200);
  while(feed.children.length>5) feed.removeChild(feed.firstChild);
}

function showAnnounce(text,dur=2400){
  const el=document.getElementById('tt-announce');
  el.textContent=text; el.classList.add('show');
  clearTimeout(showAnnounce._t);
  showAnnounce._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ══════════════════════════════════════════════════════════════════════
//  TIKTOK GIFT TIER EFFECTS
// ══════════════════════════════════════════════════════════════════════

// 🌸 SMALL (1–99 coins) — speed boost + particle burst
function effectSmall(sender, giftName, coins){
  showGiftBanner('small',`🌸 ${sender} sent ${giftName} (${coins} coins)`);
  addEventCard('🌸',`<b style="color:#f9a">${sender}</b> → ${giftName} — speed up!`,'#f9a');

  G.balls.forEach(b=>{
    const spd=Math.hypot(b.vx,b.vy);
    const ns=Math.min(spd+0.5,13);
    b.vx=(b.vx/spd)*ns; b.vy=(b.vy/spd)*ns;
  });

  // Scattered pink sparks around paddle
  for(let i=0;i<3;i++){
    spawnParticles(
      10+Math.random()*20,

// ── WebSocket — auto-detects Railway vs localhost ──────────────────────
function getWsUrl(){
  const h = window.location.hostname;
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  // Running on Railway (or any remote host) — use same host, WSS
  if(h !== 'localhost' && h !== '127.0.0.1' && h !== ''){
    return `${proto}//${window.location.host}`;
  }
  // Local dev
  return 'ws://localhost:3000';
}

let wsRetryDelay = 2000;
function connectToServer(){
  let ws;
  try { ws = new WebSocket(getWsUrl()); }
  catch(e){ onDisconnected(); setTimeout(connectToServer, wsRetryDelay); return; }

  ws.onopen = () => { wsRetryDelay = 2000; };
  ws.onmessage = e => {
    let msg; try{msg=JSON.parse(e.data);}catch{return;}
    switch(msg.event){
      case 'gift':        onGift(msg);        break;
      case 'like':        onLike(msg);        break;
      case 'comment':     onComment(msg);     break;
      case 'follow':      onFollow(msg);      break;
      case 'share':       onShare(msg);       break;
      case 'viewer':      onViewer(msg);      break;
      case 'connected':   onConnected(msg);   break;
      case 'disconnected':onDisconnected();   break;
      case 'server_info': console.log('Server:', msg.tiktok); break;
    }
  };
  ws.onclose = () => {
    onDisconnected();
    wsRetryDelay = Math.min(wsRetryDelay * 1.5, 30000);
    setTimeout(connectToServer, wsRetryDelay);
  };
  ws.onerror = () => {};
}
connectToServer();

// ── AI prediction ──────────────────────────────────────────────────────
function predictY(ball,tx){
  let x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy,ay=ball.ay;
  for(let i=0;i<1200;i++){
    x+=vx;vy+=ay;vy=Math.max(-14,Math.min(14,vy));y+=vy;
    if(y-BALL_R()<=0){y=BALL_R();vy=Math.abs(vy);}
    if(y+BALL_R()>=H()){y=H()-BALL_R();vy=-Math.abs(vy);}
    if(vx<0&&x<=tx)return y;
    if(vx>0&&x>=tx)return H()/2;
  }
  return H()/2;
}
function moveAI(dt){
  const padH=G.padH;
  let target=H()/2;
  if(G.balls.length>0){
    const danger=G.balls.reduce((a,b)=>b.vx<0&&b.x<a.x?b:a,{x:W()});
    target=danger.vx<0?predictY(danger,PAD_W()+BALL_R()+2):H()/2;
  }
  const diff=target-(G.paddleY+padH/2);
  G.paddleVY+=diff*.22;G.paddleVY=Math.max(-14,Math.min(14,G.paddleVY));G.paddleVY*=.76;
  G.paddleY+=G.paddleVY*(dt/16);
  G.paddleY=Math.max(0,Math.min(H()-padH,G.paddleY));
}

// ── Ball update ────────────────────────────────────────────────────────
function updateBall(ball){
  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>16) ball.trail.shift();
  ball.vy+=ball.ay;ball.vy+=ball.spin;
  ball.vy=Math.max(-14,Math.min(14,ball.vy));
  ball.x+=ball.vx;ball.y+=ball.vy;

  if(ball.y-BALL_R()<=0){ball.y=BALL_R();ball.vy=Math.abs(ball.vy);ball.ay*=-.6;}
  if(ball.y+BALL_R()>=H()){ball.y=H()-BALL_R();ball.vy=-Math.abs(ball.vy);ball.ay*=-.6;}

  if(ball.x+BALL_R()>=W()-14&&ball.vx>0){
    ball.x=W()-14-BALL_R();
    ball.vx=-(Math.abs(ball.vx)+.18);ball.vx=Math.max(ball.vx,-14);
    ball.ay=(Math.random()-.5)*(.12+G.score*.006);
    ball.spin=(Math.random()-.5)*(.05+G.score*.003);
    G.score++;G.hitFlash=8;addXP(10+G.level*2);
    spawnParticles(W()-14,ball.y,fireballActive?'#f80':'#39d353',16);
    document.getElementById('h-score').textContent=G.score;
    if(G.score>best){best=G.score;document.getElementById('h-best').textContent=best;}
  }

  for(let i=G.bricks.length-1;i>=0;i--){
    const b=G.bricks[i];
    if(ball.x+BALL_R()>b.x&&ball.x-BALL_R()<b.x+b.w&&ball.y+BALL_R()>b.y&&ball.y-BALL_R()<b.y+b.h){
      // Fireball breaks bricks instantly
      if(fireballActive) b.hp=0; else{ball.vx*=-1;b.hp--;}
      spawnParticles(b.x+b.w/2,b.y+b.h/2,fireballActive?'#f80':'#f80',8);
      if(b.hp<=0){
        spawnParticles(b.x+b.w/2,b.y+b.h/2,'#ff0',20);
        spawnPowerup(b.x+b.w/2,b.y+b.h/2);
        G.bricks.splice(i,1);G.score+=5;addXP(30+G.level*5);
        document.getElementById('h-score').textContent=G.score;
        if(G.score>best){best=G.score;document.getElementById('h-best').textContent=best;}
      }
      break;
    }
  }

  const padH=G.padH;
  if(ball.x-BALL_R()<=PAD_W()+2&&ball.x-BALL_R()>=6&&ball.vx<0&&
     ball.y+BALL_R()>=G.paddleY&&ball.y-BALL_R()<=G.paddleY+padH){
    ball.x=PAD_W()+2+BALL_R();
    ball.vx=Math.abs(ball.vx)+.1;
    const rel=(ball.y-(G.paddleY+padH/2))/(padH/2);
    ball.vy=rel*8+G.paddleVY*.3;ball.vy=Math.max(-14,Math.min(14,ball.vy));
    ball.ay=(Math.random()-.5)*(.09+G.score*.004);
    ball.spin=(Math.random()-.5)*.03;
    return 'alive';
  }
  if(ball.x-BALL_R()<0)return 'lost';
  return 'alive';
}

// ── Main update ────────────────────────────────────────────────────────
function update(dt){
  if(!G.running)return;
  if(G.shakeDur>0){G.shakeDur--;G.shakeX=(Math.random()-.5)*8;G.shakeY=(Math.random()-.5)*8;}
  else{G.shakeX=0;G.shakeY=0;}
  if(G.hitFlash>0)G.hitFlash--;
  if(G.ttFlashAlpha>0)G.ttFlashAlpha=Math.max(0,G.ttFlashAlpha-.015);

  moveAI(dt);

  G.particles=G.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=.045;return p.life>0;});
  G.ttBurst=G.ttBurst.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life-=.025;return p.life>0;});
  G.powerups=G.powerups.filter(pu=>{
    pu.y+=pu.vy;
    if(pu.x>6&&pu.x<PAD_W()+BALL_R()*2&&pu.y>G.paddleY&&pu.y<G.paddleY+G.padH){
      applyPowerup(pu.t);spawnParticles(pu.x,pu.y,pu.t.color,20);return false;
    }
    return pu.x>=0;
  });

  G.balls=G.balls.filter(b=>updateBall(b)!=='lost');

  if(G.balls.length===0){
    G.lives--;shake(10,20);
    spawnParticles(20,G.paddleY+G.padH/2,'#f44',22);
    document.getElementById('h-lives').textContent='❤'.repeat(Math.max(0,G.lives))+'🖤'.repeat(Math.max(0,3-G.lives));
    if(G.lives<=0){endGame();return;}
    const spd=Math.min(5+G.score*.06,13);
    G.balls=[mkBall(W()/2,H()/2+(Math.random()-.5)*80,-spd,(Math.random()*3+2)*(Math.random()<.5?1:-1))];
    G.balls[0].ay=(Math.random()-.5)*.08;G.paddleVY=0;
    flashMsg(`AI missed! ${G.lives} lives left!`);
  }
  if(G.bricks.length===0)buildBricks();
  updateAvatars();
}

// ── Drawing ────────────────────────────────────────────────────────────
function drawGrid(){
  ctx.strokeStyle='rgba(0,255,255,0.03)';ctx.lineWidth=1;
  for(let x=0;x<W();x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H());ctx.stroke();}
  for(let y=0;y<H();y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y);ctx.stroke();}
}
function drawWall(){
  const f=G.hitFlash>0?Math.min(1,G.hitFlash/8):0;
  ctx.fillStyle=`rgb(0,${Math.round(80+f*170)},50)`;
  ctx.fillRect(W()-14,0,14,H());
  ctx.fillStyle='rgba(0,255,100,0.1)';
  for(let y=0;y<H();y+=36)ctx.fillRect(W()-14,y,14,14);
  ctx.strokeStyle=`rgba(0,255,100,${.3+f*.5})`;ctx.lineWidth=1;ctx.strokeRect(W()-14,0,14,H());
}

function getPaddleColor(){
  if(goldenActive){
    // Shimmering gold
    const t=Date.now()/400;
    const r=Math.round(220+30*Math.sin(t));
    const g=Math.round(180+30*Math.sin(t+1));
    return{color:`rgb(${r},${g},0)`,glow:'#fd0',shadow:22};
  }
  if(fireballActive){
    const t=Date.now()/200;
    const r=255,g=Math.round(80+80*Math.abs(Math.sin(t)));
    return{color:`rgb(${r},${g},0)`,glow:'#f80',shadow:18};
  }
  const sk=SKINS[chosenSkin];
  return{color:sk.color,glow:sk.glow,shadow:14};
}

function drawPaddle(){
  const {color,glow,shadow}=getPaddleColor();
  ctx.shadowColor=glow;ctx.shadowBlur=shadow;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(10,G.paddleY,PAD_W(),G.padH,4);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.roundRect(12,G.paddleY+4,Math.max(2,PAD_W()-4),G.padH-8,2);ctx.fill();

  // Golden shimmer streaks
  if(goldenActive){
    ctx.fillStyle='rgba(255,255,200,0.35)';
    const t=Date.now()/300;
    const yOff=(Math.sin(t)*G.padH*.4)+G.padH*.5;
    ctx.fillRect(10,G.paddleY+yOff-4,PAD_W(),8);
  }
}

function drawBalls(){
  G.balls.forEach(ball=>{
    ball.trail.forEach((t,i)=>{
      const prog=i/ball.trail.length;
      const trailColor=fireballActive
        ?`rgba(255,${Math.round(80*prog)},0,${prog*.55})`
        :`rgba(255,${Math.round(80+100*prog)},0,${prog*.45})`;
      ctx.fillStyle=trailColor;
      ctx.beginPath();ctx.arc(t.x,t.y,BALL_R()*prog,0,Math.PI*2);ctx.fill();
    });
    // Ball glow
    const ballGlow=fireballActive?'#f80':'#fff';
    ctx.shadowColor=ballGlow;ctx.shadowBlur=fireballActive?20:12;
    ctx.fillStyle=fireballActive?'#ff6600':'#fff';
    ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R()*(fireballActive?1.15:1),0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Specular
    ctx.fillStyle=fireballActive?'rgba(255,220,0,0.6)':'rgba(255,200,100,0.5)';
    ctx.beginPath();ctx.arc(ball.x-BALL_R()*.25,ball.y-BALL_R()*.25,BALL_R()*.4,0,Math.PI*2);ctx.fill();
  });
}

function drawBricks(){
  G.bricks.forEach(b=>{
    const frac=b.hp/b.maxHp;
    const hue=frac>.66?200:frac>.33?40:0;
    ctx.fillStyle=`hsla(${hue},100%,55%,.85)`;
    ctx.shadowColor=`hsl(${hue},100%,55%)`;ctx.shadowBlur=6;
    ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
    if(b.maxHp>1){
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.font=`bold ${Math.max(8,b.h*.6)}px monospace`;ctx.textAlign='center';
      ctx.fillText(b.hp,b.x+b.w/2,b.y+b.h*.72);ctx.textAlign='left';
    }
  });
}
function drawPowerups(){
  G.powerups.forEach(pu=>{
    ctx.shadowColor=pu.t.glow;ctx.shadowBlur=12;ctx.fillStyle=pu.t.color;
    ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#000';ctx.font='bold 7px monospace';ctx.textAlign='center';
    ctx.fillText(pu.t.id.slice(0,3).toUpperCase(),pu.x,pu.y+3);ctx.textAlign='left';
  });
}
function drawParticles(){
  G.particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  G.ttBurst.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
}
function drawTTFlash(){
  if(G.ttFlashAlpha>0){ctx.fillStyle=G.ttFlashColor||'#f06';ctx.globalAlpha=G.ttFlashAlpha;ctx.fillRect(0,0,W(),H());ctx.globalAlpha=1;}
}
function drawHUD(){
  ctx.fillStyle='#ef9f27';ctx.font='11px monospace';
  ctx.fillText(`LVL ${G.level}`,W()/2-20,H()-8);
  ctx.fillStyle='#444';ctx.font='10px monospace';
  ctx.fillText(`pad shrinks in ${10-(G.score%10)}`,16,H()-8);
}

function draw(){
  ctx.save();
  if(G.shakeDur>0)ctx.translate(G.shakeX,G.shakeY);
  ctx.clearRect(-20,-20,W()+40,H()+40);
  ctx.fillStyle='#0a0a12';ctx.fillRect(-20,-20,W()+40,H()+40);
  drawGrid();drawAvatars();drawWall();drawBricks();drawPowerups();
  drawTTFlash();drawParticles();drawPaddle();drawBalls();drawHUD();
  ctx.restore();
}

// ── Game loop ──────────────────────────────────────────────────────────
function loop(ts){const dt=Math.min(ts-lastTime,32);lastTime=ts;update(dt);draw();G.animId=requestAnimationFrame(loop);}
function endGame(){
  G.running=false;
  const isNew=G.score>=best&&G.score>0;
  document.getElementById('msg').textContent=`GAME OVER — AI scored ${G.score}${isNew?' 🏆 NEW BEST!':' | Best: '+best}`;
  document.getElementById('start-btn').textContent='▶ PLAY AGAIN';
  document.getElementById('start-btn').style.display='block';
}
function flashMsg(txt,dur=1800){
  const el=document.getElementById('msg');el.textContent=txt;
  clearTimeout(flashMsg._t);flashMsg._t=setTimeout(()=>{if(G.running)el.textContent='';},dur);
}

// ── Skins ──────────────────────────────────────────────────────────────
function renderSkins(){
  const cont=document.getElementById('skins');
  cont.innerHTML='<span style="font-size:10px;color:#555;margin-right:4px">SKIN</span>';
  SKINS.forEach((sk,i)=>{
    const btn=document.createElement('div');
    btn.className='skin-btn'+(i===chosenSkin?' active':'')+(G.level<sk.unlockLv?' locked':'');
    btn.style.background=sk.color;
    btn.title=G.level<sk.unlockLv?`Unlock at LV${sk.unlockLv}`:sk.name;
    if(G.level>=sk.unlockLv)btn.addEventListener('click',()=>{chosenSkin=i;renderSkins();});
    cont.appendChild(btn);
  });
}

// ── Start ──────────────────────────────────────────────────────────────
function startGame(){
  if(G.animId)cancelAnimationFrame(G.animId);
  const ob=best;reset();best=ob;G.running=true;
  G.balls[0].vy=(Math.random()<.5?1:-1)*3.5;
  G.balls[0].ay=(Math.random()-.5)*.06;
  document.getElementById('h-score').textContent='0';
  document.getElementById('h-best').textContent=best;
  document.getElementById('h-level').textContent='1';
  document.getElementById('h-lives').textContent='❤❤❤';
  document.getElementById('xp-bar').style.width='0%';
  document.getElementById('msg').textContent='';
  document.getElementById('start-btn').style.display='none';
  renderPUTray();renderSkins();
  lastTime=performance.now();G.animId=requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();if(!G.running)startGame();}
  // Test keys
  if(e.key==='1')window.testSmall();
  if(e.key==='2')window.testMedium();
  if(e.key==='3')window.testBig();
  if(e.key==='4')window.testMega();
  if(e.key==='5')onLike({sender:'TestUser',likeCount:10});
  if(e.key==='6')onFollow({sender:'TestUser'});
  if(e.key==='7')onShare({sender:'TestUser'});
});

// Touch
['btn-up','btn-down'].forEach(id=>{
  const el=document.getElementById(id),isUp=id==='btn-up';
  el.addEventListener('touchstart',e=>{e.preventDefault();isUp?touchUp=true:touchDown=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();isUp?touchUp=false:touchDown=false;},{passive:false});
});
let touchUp=false,touchDown=false;

renderSkins();
seedDemoAvatars();

// Animate avatars even on idle screen before game starts
function idleLoop(ts){
  if(G.running)return;
  updateAvatars();draw();
  requestAnimationFrame(idleLoop);
}
requestAnimationFrame(idleLoop);
draw();
</script>
</body>
</html>
