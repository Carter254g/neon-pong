<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Neon Pong × TikTok Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0a12;overflow:hidden;font-family:'Courier New',monospace;color:#fff}
#root{display:flex;flex-direction:column;align-items:center;height:100vh;padding:.3rem .5rem}
#hud{display:flex;gap:.8rem;align-items:center;margin-bottom:.2rem;flex-wrap:wrap;justify-content:center}
.hi{display:flex;flex-direction:column;align-items:center}
.hl{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
.hv{font-size:1rem;font-weight:500;color:#0ff;text-shadow:0 0 8px #0ff}
#tt-status{display:flex;align-items:center;gap:5px;font-size:10px;padding:2px 10px;border-radius:20px;border:1px solid #333;color:#555;margin-bottom:3px;transition:all .4s}
#tt-status.live{border-color:#f06;color:#f06;text-shadow:0 0 6px #f06}
#tt-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .4s}
#tt-status.live #tt-dot{background:#f06;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#main{display:flex;gap:8px;align-items:flex-start;justify-content:center;width:100%}
canvas{border:1px solid #0ff3;border-radius:6px;display:block;background:#0a0a12}
#right-panel{display:flex;flex-direction:column;gap:5px;width:158px;flex-shrink:0}
#comments-box{background:rgba(255,255,255,.03);border:1px solid #ffffff11;border-radius:6px;padding:6px;flex:1;overflow:hidden}
#comments-title{font-size:9px;color:#f06;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px}
#comments-list{display:flex;flex-direction:column;gap:3px}
.ci{font-size:10px;line-height:1.3;animation:sIn .2s ease}
.cn{font-weight:bold}.ct{color:#aaa}
#events-box{background:rgba(255,255,255,.03);border:1px solid #ffffff11;border-radius:6px;padding:6px}
#events-title{font-size:9px;color:#0ff;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ec{display:flex;align-items:flex-start;gap:4px;padding:3px 5px;border-radius:3px;border:1px solid;font-size:10px;margin-bottom:3px;animation:sIn .2s ease}
.ei{font-size:13px;flex-shrink:0}.eb{line-height:1.3;color:#bbb}
@keyframes sIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
#gift-buttons{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:.3rem}
.gb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 5px;border-radius:5px;border:1px solid;background:transparent;cursor:pointer;font-family:'Courier New',monospace}
.gb:hover{background:rgba(255,255,255,.06)}
.gb-icon{font-size:15px;line-height:1}.gb-label{font-size:7px}
#banner{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:15px;font-weight:bold;pointer-events:none;z-index:20;opacity:0;transition:opacity .3s;letter-spacing:1px}
#banner.show{opacity:1}
#gift-banner{position:absolute;top:0;left:0;right:0;text-align:center;font-size:13px;font-weight:bold;padding:5px;pointer-events:none;z-index:21;transform:translateY(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
#gift-banner.show{transform:translateY(0)}
#start-btn{margin-top:.3rem;padding:8px 28px;font-size:14px;border:1px solid #0ff;border-radius:4px;background:transparent;color:#0ff;cursor:pointer;letter-spacing:2px;text-shadow:0 0 6px #0ff;box-shadow:0 0 10px #0ff3}
#start-btn:hover{background:#0ff2}
</style>
</head>
<body>
<div id="root">
  <div id="tt-status"><div id="tt-dot"></div><span id="tt-label">TikTok: not connected</span></div>
  <div id="hud">
    <div class="hi"><span class="hl">You (first to 7)</span><span class="hv" id="h-score">0</span></div>
    <div class="hi"><span class="hl" style="color:#f44">Rival</span><span class="hv" id="h-opp" style="color:#f44;text-shadow:0 0 8px #f44">0</span></div>
    <div class="hi"><span class="hl">Best</span><span class="hv" id="h-best" style="color:#f0f;text-shadow:0 0 8px #f0f">0</span></div>
    <div class="hi"><span class="hl">Level</span><span class="hv" id="h-level" style="color:#ff0;text-shadow:0 0 8px #ff0">1</span></div>
    <div class="hi"><span class="hl">Lives</span><span class="hv" id="h-lives" style="color:#f44">&#10084;&#10084;&#10084;</span></div>
  </div>
  <!-- Win overlay -->
  <div id="win-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:12px">
    <div id="win-title" style="font-size:32px;font-weight:bold;letter-spacing:3px;font-family:'Courier New',monospace"></div>
    <div id="win-msg" style="font-size:14px;font-family:'Courier New',monospace;opacity:.8"></div>
    <div id="win-score" style="font-size:28px;font-weight:bold;font-family:'Courier New',monospace;margin:.3rem 0"></div>
    <div style="font-size:11px;color:#555;font-family:'Courier New',monospace">FIRST TO 7 WINS</div>
    <button onclick="rematch()" style="margin-top:12px;padding:12px 36px;font-size:16px;border:2px solid #0ff;border-radius:6px;background:transparent;color:#0ff;cursor:pointer;letter-spacing:3px;text-shadow:0 0 8px #0ff;box-shadow:0 0 16px #0ff4;font-family:'Courier New',monospace">🔁 REMATCH</button>
    <button onclick="document.getElementById('win-overlay').style.display='none';document.getElementById('start-btn').style.display='block';" style="padding:8px 24px;font-size:12px;border:1px solid #555;border-radius:4px;background:transparent;color:#555;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace">MAIN MENU</button>
  </div>

  <div id="main" style="position:relative">
    <div id="gift-banner"></div>
    <div id="banner"></div>
    <div style="display:flex;flex-direction:column;align-items:center">
      <canvas id="canvas"></canvas>
      <button id="start-btn">&#9658; START</button>
      <div id="gift-buttons"></div>
    </div>
    <div id="right-panel">
      <div id="comments-box">
        <div id="comments-title">
          <span style="width:6px;height:6px;border-radius:50%;background:#f06;display:inline-block;animation:blink 1s infinite"></span>
          live comments
        </div>
        <div id="comments-list"></div>
      </div>
      <div id="events-box">
        <div id="events-title">&#9889; events</div>
      </div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
function rsz(){
  const mw=Math.min(window.innerWidth-185,720),mh=Math.min(window.innerHeight-175,500);
  const r=16/9;let cw=mw,ch=mw/r;if(ch>mh){ch=mh;cw=ch*r;}
  canvas.width=Math.floor(cw);canvas.height=Math.floor(ch);
}
rsz();window.addEventListener('resize',()=>{rsz();if(!G.running)draw();});
const CW=()=>canvas.width,CH=()=>canvas.height;
const BR=()=>Math.max(5,CW()*.011),PW=()=>Math.max(10,CW()*.016);
const MP=()=>Math.max(60,CH()*.22),MNP=()=>Math.max(22,CH()*.07);

// Arenas
const ARENAS=[
  {name:'Deep Space',   bg:'#0a0a12',grid:'rgba(0,255,255,.03)',wall:'#00ff50',acc:'#0ff'},
  {name:'Cyberpunk',    bg:'#0d0014',grid:'rgba(255,0,255,.04)', wall:'#ff00ff',acc:'#f0f'},
  {name:'Electric Storm',bg:'#050510',grid:'rgba(255,255,0,.04)',wall:'#ffff00',acc:'#ff0'},
  {name:'Ocean',        bg:'#000d1a',grid:'rgba(0,150,255,.04)', wall:'#00aaff',acc:'#0af'},
  {name:'Volcano',      bg:'#120500',grid:'rgba(255,80,0,.04)',  wall:'#ff4400',acc:'#f80'},
  {name:'Jungle',       bg:'#021008',grid:'rgba(0,255,100,.04)', wall:'#00ff66',acc:'#0f8'},
];
let arenaIdx=0,blending=false,blendAmt=0,nextArena=0;
const ca=()=>ARENAS[arenaIdx];
function triggerArena(){if(blending)return;blending=true;blendAmt=0;nextArena=(arenaIdx+1)%ARENAS.length;}
function updateArena(dt){
  if(!blending)return;blendAmt+=dt/700;
  if(blendAmt>=1){arenaIdx=nextArena;blending=false;blendAmt=0;showBanner(ARENAS[arenaIdx].name.toUpperCase()+' ARENA',ARENAS[arenaIdx].acc);}
}

// Formations
const FMTS=['classic','diamond','circle','zigzag','scatter'];
let fIdx=0;
function buildBricks(){
  G.bricks=[];const f=FMTS[fIdx%FMTS.length];fIdx++;
  const bw=Math.floor(CW()*.058),bh=Math.floor(CH()*.048),gap=4;
  const cx=CW()*.60,cy=CH()*.42;
  if(f==='classic'){
    const cols=6,rows=3,sx=CW()-14-cols*(bw+gap),sy=CH()*.06;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)G.bricks.push({x:sx+c*(bw+gap),y:sy+r*(bh+gap),w:bw,h:bh,hp:rows-r,mhp:rows-r});
  }else if(f==='diamond'){
    [[0,-3],[-1,-2],[0,-2],[1,-2],[-2,-1],[-1,-1],[0,-1],[1,-1],[2,-1],[-2,0],[-1,0],[0,0],[1,0],[2,0],[-2,1],[-1,1],[0,1],[1,1],[2,1],[-1,2],[0,2],[1,2],[0,3]]
    .filter(([c,r])=>Math.abs(c)+Math.abs(r)<=3)
    .forEach(([c,r])=>G.bricks.push({x:cx+c*(bw+gap)-bw/2,y:cy+r*(bh+gap)-bh/2,w:bw,h:bh,hp:Math.max(1,3-Math.abs(r)),mhp:Math.max(1,3-Math.abs(r))}));
  }else if(f==='circle'){
    [1.4,2.6,3.8].forEach((rad,ri)=>{
      const cnt=Math.round(2*Math.PI*rad*2.2);
      for(let i=0;i<cnt;i++){const a=(i/cnt)*Math.PI*2;G.bricks.push({x:cx+Math.cos(a)*rad*(bw+gap)*.9-bw/2,y:cy+Math.sin(a)*rad*(bh+gap)*1.1-bh/2,w:bw,h:bh,hp:3-ri,mhp:3-ri});}
    });
  }else if(f==='zigzag'){
    const cols=6,rows=4,sx=CW()-14-cols*(bw+gap),sy=CH()*.05;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)G.bricks.push({x:sx+c*(bw+gap)+(r%2===0?0:(bw+gap)/2),y:sy+r*(bh+gap*1.4),w:bw,h:bh,hp:Math.max(1,rows-r),mhp:Math.max(1,rows-r)});
  }else{
    for(let i=0;i<20;i++)G.bricks.push({x:CW()*.35+Math.random()*(CW()*.58-bw),y:CH()*.05+Math.random()*(CH()*.8-bh),w:bw,h:bh,hp:Math.ceil(Math.random()*3),mhp:3});
  }
}

// Opponent
const ONAMES=['@NeonRival','@CyberGhost','@PixelHunter','@StormBot','@VoltStriker','@ArcadeKing','@NightRunner','@PhantomX'];
let oppY=100,oppVY=0,oppName='@NeonRival',oppROff=0,oppRT=0,oppJ=0,oppJT=0;
function resetOpp(){oppName=ONAMES[Math.floor(Math.random()*ONAMES.length)];oppY=CH()/2-MP()*.42;oppVY=0;oppROff=0;oppRT=0;}
function moveOpp(dt){
  const ph=G.padH*.85;let tgt=CH()/2;
  let bb=null,bs=-Infinity;
  (G.balls||[]).forEach(b=>{if(b.vx>0){const sc=b.x/(Math.abs(b.vx)+.1);if(sc>bs){bs=sc;bb=b;}}});
  if(bb){
    let x=bb.x,y=bb.y,vx=bb.vx,vy=bb.vy,ay=bb.ay;
    const tx=CW()-14-BR()-PW()-4;
    for(let i=0;i<800;i++){x+=vx;vy=Math.max(-14,Math.min(14,vy+ay));y+=vy;if(y-BR()<=0){y=BR();vy=Math.abs(vy);}if(y+BR()>=CH()){y=CH()-BR();vy=-Math.abs(vy);}if(x>=tx)break;}
    oppRT-=dt;if(oppRT<=0){
      // Opponent deliberately misses — larger error at lower scores so you always feel superior
      const missBase=Math.max(30,80-G.score*.5);
      oppROff=(Math.random()-.5)*missBase*2;
      oppRT=200+Math.random()*400;  // reacts slower too
    }
    tgt=y+oppROff;
  }
  oppJT-=dt;if(oppJT<=0){oppJ=(Math.random()-.5)*3;oppJT=60+Math.random()*120;}
  const diff=(tgt+oppJ)-(oppY+ph/2);
  const sp=Math.min(Math.abs(diff)*.07*(dt/16),CH()*.028*(dt/16)); // deliberately slow
  oppY+=Math.sign(diff)*sp;oppVY=Math.sign(diff)*sp;oppY=Math.max(0,Math.min(CH()-ph,oppY));
}
function chkOpp(ball){
  const ph=G.padH*.85,ox=CW()-14-PW()-2;
  if(ball.x+BR()>=ox&&ball.x+BR()<=ox+PW()+4&&ball.vx>0&&ball.y+BR()>=oppY&&ball.y-BR()<=oppY+ph){
    ball.x=ox-BR();ball.vx=-(Math.abs(ball.vx)+.1);
    const rel=(ball.y-(oppY+ph/2))/(ph/2);
    ball.vy=rel*7+oppVY*.2;ball.vy=Math.max(-13,Math.min(13,ball.vy));
    ball.ay=(Math.random()-.5)*.1;ball.spin=(Math.random()-.5)*.03;return true;
  }return false;
}

// State
let best=0,lastT=0,ficons=[];
let fbActive=false,fbTimer=null,goldActive=false,goldTimer=null;
let playerScore=0,oppScore=0;
const WIN_SCORE=7; // first to 7 wins!
let G={running:false,score:0,lives:3,level:1,xp:0,padH:80,paddleY:150,paddleVY:0,balls:[],bricks:[],particles:[],powerups:[],hitFlash:0,animId:null,burst:[],fColor:'#f06',fAlpha:0,bannerAlpha:0};
function mkBall(x,y,vx,vy){return{x,y,vx,vy,ay:0,spin:0,trail:[]};}

function checkWin(){
  if(playerScore>=WIN_SCORE){
    showWinScreen(true);
  } else if(oppScore>=WIN_SCORE){
    showWinScreen(false);
  }
}

function showWinScreen(playerWon){
  G.running=false;
  cancelAnimationFrame(G.animId);

  // Draw final state then overlay win screen
  const overlay=document.getElementById('win-overlay');
  const title=document.getElementById('win-title');
  const msg=document.getElementById('win-msg');
  const scoreEl=document.getElementById('win-score');

  if(playerWon){
    title.textContent='YOU WIN! 🏆';
    title.style.color='#fd0';title.style.textShadow='0 0 20px #fd0, 0 0 40px #fd0';
    msg.textContent=oppName+' has been defeated!';
    msg.style.color='#0f8';
    scoreEl.textContent=playerScore+' – '+oppScore;
    scoreEl.style.color='#fd0';
  } else {
    title.textContent='YOU LOSE 😅';
    title.style.color='#f44';title.style.textShadow='0 0 20px #f44';
    msg.textContent=oppName+' beat you this time...';
    msg.style.color='#f44';
    scoreEl.textContent=playerScore+' – '+oppScore;
    scoreEl.style.color='#f44';
  }
  overlay.style.display='flex';

  // Burst particles for win
  if(playerWon){
    for(let i=0;i<80;i++){
      const a=Math.random()*Math.PI*2,s=Math.random()*8+2;
      G.burst.push({x:CW()/2,y:CH()/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:['#fd0','#0ff','#f0f','#0f8'][Math.floor(Math.random()*4)],sz:Math.random()*6+2});
    }
    G.fColor='#fd0';G.fAlpha=.5;
    // Keep drawing particles
    function celebLoop(ts){
      const dt=Math.min(ts-lastT,32);lastT=ts;
      G.burst=(G.burst||[]).filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life-=.02;return p.life>0;});
      G.fAlpha=Math.max(0,G.fAlpha-.01);
      draw();
      if(G.burst.length>0||G.fAlpha>0)requestAnimationFrame(celebLoop);
    }
    requestAnimationFrame(celebLoop);
  }
}

function rematch(){
  document.getElementById('win-overlay').style.display='none';
  playerScore=0;oppScore=0;
  document.getElementById('h-score').textContent='0';
  document.getElementById('h-opp').textContent='0';
  // Pick new random opponent
  oppName=ONAMES[Math.floor(Math.random()*ONAMES.length)];
  addComment('system','New rival: '+oppName+'! 🎮','#f44');
  startGame();
}
function reset(){
  if(fbTimer)clearTimeout(fbTimer);if(goldTimer)clearTimeout(goldTimer);
  fbActive=false;goldActive=false;ficons=[];resetOpp();
  G={running:false,score:0,lives:3,level:1,xp:0,padH:MP(),paddleY:CH()/2-MP()/2,paddleVY:0,balls:[mkBall(CW()/2,CH()/2,-5,3)],bricks:[],particles:[],powerups:[],hitFlash:0,animId:null,burst:[],fColor:'#f06',fAlpha:0,bannerAlpha:0};
  buildBricks();
}

// AI
let aiJ=0,aiJT=0;
function predY(ball,tx){
  let x=ball.x,y=ball.y,vx=ball.vx,vy=ball.vy,ay=ball.ay;
  for(let i=0;i<1200;i++){x+=vx;vy+=ay;vy=Math.max(-14,Math.min(14,vy));y+=vy;
    if(y-BR()<=0){y=BR();vy=Math.abs(vy);}if(y+BR()>=CH()){y=CH()-BR();vy=-Math.abs(vy);}
    if(vx<0&&x<=tx)return y;if(vx>0&&x>=tx)return CH()/2;}return CH()/2;
}
function moveAI(dt){
  const ph=G.padH;let tgt=CH()/2;
  if((G.balls||[]).length>0){
    let bb=null,bs=-Infinity;
    G.balls.forEach(b=>{if(b.vx<0){const s=(CW()-b.x)/(Math.abs(b.vx)+.1);if(s>bs){bs=s;bb=b;}}});
    if(bb)tgt=predY(bb,PW()+BR()+2);
  }
  aiJT-=dt;if(aiJT<=0){aiJ=(Math.random()-.5)*1.5;aiJT=80+Math.random()*150;}
  const diff=(tgt+aiJ)-(G.paddleY+ph/2);
  const sp=Math.min(Math.abs(diff)*.18*(dt/16),CH()*.055*(dt/16));
  G.paddleY+=Math.sign(diff)*sp;G.paddleY=Math.max(0,Math.min(CH()-ph,G.paddleY));G.paddleVY=Math.sign(diff)*sp;
}

// XP
function addXP(a){G.xp+=a;while(G.xp>=25){G.xp-=25;G.level++;document.getElementById('h-level').textContent=G.level;buildBricks();}}

// Particles
function spawnP(x,y,col,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col});}}
function burst(col){G.fColor=col;G.fAlpha=.35;for(let i=0;i<45;i++){const a=Math.random()*Math.PI*2,s=Math.random()*6+2;G.burst.push({x:CW()/2,y:CH()/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:Math.random()*5+2});}}
function spawnExtra(n){
  // Spawn balls going TOWARD the wall (right) — gives you more scoring chances
  const startX=CW()*.35,startY=CH()/2;
  for(let i=0;i<n;i++){
    const vy=(Math.random()*4+2)*(Math.random()<.5?1:-1);
    G.balls.push(mkBall(startX+(Math.random()-.5)*50,startY+(Math.random()-.5)*80,4+Math.random()*2,vy));
  }
}
function spawnIcon(icon,col,n=3){
  const sx=10+PW()+10+Math.random()*20,sy=G.paddleY+G.padH/2;
  for(let i=0;i<n;i++){const a=-(Math.PI/4)+(Math.random()*Math.PI/3),sp=3+Math.random()*2;ficons.push({icon,col,x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,sz:22+Math.random()*7,delay:i*130,active:false});}
}

// Banners
let banT=null,giftBT=null;
function showBanner(txt,col){
  const el=document.getElementById('banner');el.textContent=txt;el.style.color=col;el.style.textShadow=`0 0 16px ${col}`;el.classList.add('show');
  clearTimeout(banT);banT=setTimeout(()=>el.classList.remove('show'),2200);
}
function showGiftBanner(txt,col){
  const el=document.getElementById('gift-banner');el.textContent=txt;el.style.color=col;el.style.background=col+'18';el.style.borderBottom=`1px solid ${col}55`;el.classList.add('show');
  clearTimeout(giftBT);giftBT=setTimeout(()=>el.classList.remove('show'),2800);
}

// Comments & events
function addComment(name,text,col='#0ff'){
  const list=document.getElementById('comments-list');
  const d=document.createElement('div');d.className='ci';
  d.innerHTML=`<span class="cn" style="color:${col}">@${name}</span> <span class="ct">${text.slice(0,38)}</span>`;
  list.insertBefore(d,list.firstChild);setTimeout(()=>d.remove(),8000);
  while(list.children.length>6)list.removeChild(list.lastChild);
}
function addEvent(icon,user,action,col){
  const box=document.getElementById('events-box');
  const d=document.createElement('div');d.className='ec';d.style.borderColor=col+'44';d.style.background=col+'0a';
  d.innerHTML=`<span class="ei">${icon}</span><div class="eb"><span style="color:${col};font-weight:bold">@${user}</span><br><span style="opacity:.7">${action}</span></div>`;
  const t=box.querySelector('#events-title');box.insertBefore(d,t.nextSibling);setTimeout(()=>d.remove(),5000);
  const cards=box.querySelectorAll('.ec');if(cards.length>4)cards[cards.length-1].remove();
}

// TikTok effects
const FNS=['TikFan99','NeonViewer','Sam_Fan','LiveWatch','BigSupport','GiftKing','NightOwl','ArcadeFan'];
const fn=()=>FNS[Math.floor(Math.random()*FNS.length)];

function onGift(sender,gname,coins,tier){
  if(!G.running)return;
  const icons={small:'🌹',medium:'🎆',big:'🦁',mega:'🌌'};
  const cols={small:'#f9a',medium:'#4af',big:'#f80',mega:'#fd0'};
  const acts={small:'speed boost',medium:'extra ball',big:'FIREBALL!',mega:'GOLDEN PADDLE!'};
  const ic=icons[tier]||'🎁',col=cols[tier]||'#fff',act=acts[tier]||'effect';
  spawnIcon(ic,col,tier==='mega'?5:tier==='big'?4:3);
  addEvent(ic,sender,`${gname} → ${act}`,col);
  addComment(sender,`sent ${gname}! ${ic}`,col);
  showGiftBanner(`${ic} ${sender} sent ${gname}!`,col);
  if(tier==='small'){
    G.balls.forEach(b=>{
      const s=Math.hypot(b.vx,b.vy);const ns=Math.min(s+.8,13);
      // Redirect all balls to go RIGHT (toward wall) for max scoring advantage
      b.vx=Math.abs(b.vx/s)*ns;  // force positive x = toward wall
      b.vy=(b.vy/s)*ns;
    });
    spawnP(10,G.paddleY+G.padH/2,col,14);addXP(15);
  }
  if(tier==='medium'){spawnExtra(1);spawnP(CW()/2,CH()/2,col,18);addXP(25);}
  if(tier==='big'){
    fbActive=true;
    G.balls.forEach(b=>{
      const s=Math.hypot(b.vx,b.vy);
      b.vx=Math.abs(b.vx/s)*Math.min(s*1.5,13); // send toward wall
      b.vy=(b.vy/s)*Math.min(s*1.5,13);
      b.ay=(Math.random()-.5)*.18;
    });
    burst(col);addXP(80);
    // Confuse opponent during fireball
    oppROff=(Math.random()-.5)*200;oppRT=3000;
    if(fbTimer)clearTimeout(fbTimer);fbTimer=setTimeout(()=>{fbActive=false;},15000);
  }
  if(tier==='mega'){
    goldActive=true;G.padH=Math.min(MP()*1.9,G.padH+MP()*.7);burst(col);addXP(200);
    // Also massively increase opponent miss during golden paddle
    oppROff=(Math.random()-.5)*300;oppRT=5000; // opponent basically frozen for 5s
    if(goldTimer)clearTimeout(goldTimer);goldTimer=setTimeout(()=>{goldActive=false;G.padH=Math.max(MNP(),G.padH-MP()*.7);},30000);
  }
}
function onLike(s){if(!G.running)return;spawnIcon('❤️','#f44',2);addEvent('❤️',s,'liked → speed','#f44');addComment(s,'❤️','#f44');G.balls.forEach(b=>{const sp=Math.hypot(b.vx,b.vy);if(sp<12){const ns=Math.min(sp+.4,12);b.vx=(b.vx/sp)*ns;b.vy=(b.vy/sp)*ns;}});spawnP(CW()/2,CH()/2,'#f44',8);addXP(5);}

  const savedOppPadMult=.75;

  spawnP(10,G.paddleY+G.padH/2,'#0f8',18);

  setTimeout(()=>{if(!goldActive)G.padH=Math.max(MNP(),G.padH-MP()*.6);},6000);
}
function onShare(s){if(!G.running)return;spawnIcon('🔁','#f80',3);addEvent('🔁',s,'shared → multi ball','#f80');addComment(s,'shared the stream! 🔁','#f80');showBanner(`🔁 @${s} — MULTI BALL!`,'#f80');spawnExtra(2);burst('#f80');addXP(30);}
function onComment(s,text){addComment(s,text,'#0ff');if(!G.running)return;spawnIcon('💬','#0ff',1);addEvent('💬',s,text.slice(0,18),'#0ff');addXP(3);}

// Gift buttons
const GIFTS=[

// Ball update
function updBall(ball){
  ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>14)ball.trail.shift();
  ball.vy+=ball.ay;ball.vy+=ball.spin;ball.vy=Math.max(-14,Math.min(14,ball.vy));
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-BR()<=0){ball.y=BR();ball.vy=Math.abs(ball.vy);ball.ay*=-.6;}
  if(ball.y+BR()>=CH()){ball.y=CH()-BR();ball.vy=-Math.abs(ball.vy);ball.ay*=-.6;}
  if(chkOpp(ball))return 'alive';
  if(ball.x+BR()>=CW()-14&&ball.vx>0){
    ball.x=CW()-14-BR();ball.vx=-(Math.abs(ball.vx)+.18);ball.vx=Math.max(ball.vx,-14);
    ball.ay=(Math.random()-.5)*(.1+G.score*.005);ball.spin=(Math.random()-.5)*(.04+G.score*.002);
    G.score++;playerScore++;G.hitFlash=8;addXP(12);
    if(G.score>0&&G.score%15===0)triggerArena();
    document.getElementById('h-score').textContent=playerScore;
    if(playerScore>best){best=playerScore;document.getElementById('h-best').textContent=best;}
    checkWin();
    spawnP(CW()-14,ball.y,fbActive?'#f80':ca().wall,12);
    // score updated in wall hit above
  }
  for(let i=(G.bricks||[]).length-1;i>=0;i--){
    const b=G.bricks[i];
    if(ball.x+BR()>b.x&&ball.x-BR()<b.x+b.w&&ball.y+BR()>b.y&&ball.y-BR()<b.y+b.h){
      if(fbActive)b.hp=0;else{ball.vx*=-1;b.hp--;}
      if(b.hp<=0){spawnP(b.x+b.w/2,b.y+b.h/2,'#ff0',14);addXP(30);G.bricks.splice(i,1);}
      break;
    }
  }
  const ph=G.padH;
  if(ball.x-BR()<=PW()+2&&ball.x-BR()>=6&&ball.vx<0&&ball.y+BR()>=G.paddleY&&ball.y-BR()<=G.paddleY+ph){
    ball.x=PW()+2+BR();ball.vx=Math.abs(ball.vx)+.1;
    const rel=(ball.y-(G.paddleY+ph/2))/(ph/2);ball.vy=rel*8;ball.vy=Math.max(-14,Math.min(14,ball.vy));
    ball.ay=(Math.random()-.5)*(.08+G.score*.003);ball.spin=(Math.random()-.5)*.03;return 'alive';
  }
  if(ball.x-BR()<0){
    // Opponent scores!
    oppScore++;
    document.getElementById('h-opp').textContent=oppScore;
    checkWin();
    return 'lost';
  }
  return 'alive';
}

// Main update
function update(dt){
  if(!G.running)return;
  updateArena(dt);moveAI(dt);moveOpp(dt);
  if(G.hitFlash>0)G.hitFlash--;if(G.fAlpha>0)G.fAlpha=Math.max(0,G.fAlpha-.013);
  G.particles=(G.particles||[]).filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=.045;return p.life>0;});
  G.burst=(G.burst||[]).filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life-=.025;return p.life>0;});
  ficons=ficons.filter(f=>{if(f.delay>0){f.delay-=dt;return true;}f.active=true;f.x+=f.vx;f.y+=f.vy;f.vy+=.05;f.life-=.016;return f.life>0;});
  G.balls=(G.balls||[]).filter(b=>updBall(b)!=='lost');
  if((G.balls||[]).length===0){
    const sp=Math.min(5+G.score*.05,12);
    G.balls=[mkBall(CW()/2,CH()/2+(Math.random()-.5)*60,-sp,(Math.random()*3+2)*(Math.random()<.5?1:-1))];
    G.balls[0].ay=(Math.random()-.5)*.08;
  }
  if((G.bricks||[]).length===0)buildBricks();
}

// Paddle color
function padCol(){
  if(goldActive){const t=Date.now()/400;return{c:`rgb(${Math.round(220+30*Math.sin(t))},${Math.round(180+30*Math.sin(t+1))},0)`,g:'#fd0',s:20};}
  if(fbActive){const t=Date.now()/200;return{c:`rgb(255,${Math.round(80+80*Math.abs(Math.sin(t)))},0)`,g:'#f80',s:16};}
  return{c:ca().acc,g:ca().acc,s:12};
}

function draw(){
  ctx.save();
  const a=ca();
  ctx.fillStyle=a.bg;ctx.fillRect(-5,-5,CW()+10,CH()+10);
  if(blending){ctx.globalAlpha=blendAmt;ctx.fillStyle=ARENAS[nextArena].bg;ctx.fillRect(-5,-5,CW()+10,CH()+10);ctx.globalAlpha=1;}
  ctx.strokeStyle=a.grid;ctx.lineWidth=1;
  for(let x=0;x<CW();x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH());ctx.stroke();}
  for(let y=0;y<CH();y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW(),y);ctx.stroke();}
  ctx.fillStyle=a.acc+'33';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(a.name.toUpperCase(),CW()/2,CH()-18);ctx.textAlign='left';
  const f=G.hitFlash>0?Math.min(1,G.hitFlash/8):0;
  ctx.fillStyle=a.wall+'22';ctx.fillRect(CW()-14,0,14,CH());
  ctx.shadowColor=a.wall;ctx.shadowBlur=f*14;ctx.strokeStyle=a.wall+(f>0?'cc':'55');ctx.lineWidth=2;ctx.strokeRect(CW()-14,0,14,CH());ctx.shadowBlur=0;
  (G.bricks||[]).forEach(b=>{
    const fr=b.hp/b.mhp,hue=fr>.66?200:fr>.33?40:0;
    ctx.fillStyle=`hsla(${hue},100%,${50+fr*30}%,${.6+fr*.4})`;ctx.shadowColor=`hsl(${hue},100%,55%)`;ctx.shadowBlur=fr>.5?5:2;
    ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
    if(b.mhp>1){const dr=1.8,sp=6,tw=(b.hp-1)*sp,sx=b.x+b.w/2-tw/2;ctx.fillStyle='rgba(255,255,255,.75)';for(let i=0;i<b.hp;i++){ctx.beginPath();ctx.arc(sx+i*sp,b.y+b.h/2,dr,0,Math.PI*2);ctx.fill();}}
  });
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='alphabetic';
  if(G.fAlpha>0){ctx.fillStyle=G.fColor;ctx.globalAlpha=G.fAlpha;ctx.fillRect(0,0,CW(),CH());ctx.globalAlpha=1;}
  (G.particles||[]).forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  (G.burst||[]).forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ficons.forEach(fi=>{if(!fi.active)return;ctx.globalAlpha=Math.min(1,fi.life*2);ctx.shadowColor=fi.col;ctx.shadowBlur=10;ctx.font=`${Math.round(fi.sz)}px serif`;ctx.fillText(fi.icon,fi.x,fi.y);ctx.shadowBlur=0;});
  ctx.globalAlpha=1;ctx.textBaseline='alphabetic';ctx.textAlign='left';
  // Opponent
  const oph=G.padH*.85,ox=CW()-14-PW()-2;
  ctx.shadowColor='#f44';ctx.shadowBlur=12;ctx.fillStyle='#f44';ctx.beginPath();ctx.roundRect(ox,oppY,PW(),oph,4);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(ox+2,oppY+4,PW()-4,oph-8,2);ctx.fill();
  ctx.fillStyle='#f44';ctx.shadowColor='#f44';ctx.shadowBlur=5;ctx.font='bold 9px monospace';ctx.textAlign='right';
  ctx.fillText(oppName,CW()-18,oppY>CH()-28?oppY-5:oppY+oph+12);ctx.shadowBlur=0;ctx.textAlign='left';
  // Player paddle
  const{c,g,s}=padCol();
  ctx.shadowColor=g;ctx.shadowBlur=s;ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(10,G.paddleY,PW(),G.padH,4);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.roundRect(12,G.paddleY+4,PW()-4,G.padH-8,2);ctx.fill();
  if(goldActive){ctx.fillStyle='rgba(255,255,200,.35)';const t=Date.now()/300;ctx.fillRect(10,G.paddleY+(Math.sin(t)*G.padH*.4)+G.padH*.5-4,PW(),6);}
  ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=7;ctx.font='bold 10px monospace';ctx.textAlign='left';ctx.fillText('@big_sam34',10,16);ctx.shadowBlur=0;
  // Balls
  (G.balls||[]).forEach(ball=>{
    ball.trail.forEach((t,i)=>{const prog=i/ball.trail.length;ctx.fillStyle=fbActive?`rgba(255,${Math.round(80*prog)},0,${prog*.55})`:`rgba(255,${Math.round(80+100*prog)},0,${prog*.42})`;ctx.beginPath();ctx.arc(t.x,t.y,BR()*prog,0,Math.PI*2);ctx.fill();});
    ctx.shadowColor=fbActive?'#f80':'#fff';ctx.shadowBlur=fbActive?16:9;ctx.fillStyle=fbActive?'#ff5500':'#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,BR()*(fbActive?1.15:1),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  // XP bar
  const xp=Math.min(1,G.xp/25);ctx.fillStyle='#1a1a2e';ctx.fillRect(0,CH()-3,CW(),3);
  ctx.fillStyle=ca().acc;ctx.shadowColor=ca().acc;ctx.shadowBlur=4;ctx.fillRect(0,CH()-3,CW()*xp,3);ctx.shadowBlur=0;
  ctx.fillStyle='#ef9f27';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('LVL '+G.level,CW()/2,CH()-6);ctx.textAlign='left';
  ctx.restore();
}

// Game loop
function loop(ts){const dt=Math.min(ts-lastT,32);lastT=ts;update(dt);draw();G.animId=requestAnimationFrame(loop);}

function startGame(){
  if(G.animId)cancelAnimationFrame(G.animId);
  const ob=best;reset();best=ob;G.running=true;
  G.balls[0].vy=(Math.random()<.5?1:-1)*3;G.balls[0].ay=(Math.random()-.5)*.05;
  playerScore=0;oppScore=0;
  ['h-score','h-opp','h-level'].forEach(id=>document.getElementById(id).textContent=id==='h-level'?'1':'0');
  document.getElementById('h-best').textContent=best;
  document.getElementById('h-lives').textContent='&#10084;&#10084;&#10084;';
  document.getElementById('start-btn').style.display='none';
  lastT=performance.now();G.animId=requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();if(!G.running)startGame();}
  if(e.key==='1')onGift(fn(),'Rose',1,'small');
  if(e.key==='2')onGift(fn(),'Fireworks',199,'medium');
  if(e.key==='3')onGift(fn(),'Lion',1000,'big');
  if(e.key==='4')onGift(fn(),'Galaxy',5000,'mega');
  if(e.key==='5')onLike(fn());if(e.key==='6')onFollow(fn());if(e.key==='7')onShare(fn());
  if(e.key==='8')onComment(fn(),'This game is insane! 🔥');
});

// WebSocket to TikTok server
let wsD=2000;
function connectWS(){
  let ws;try{ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host);}catch(e){setTimeout(connectWS,wsD);return;}
  ws.onopen=()=>{wsD=2000;};
  ws.onmessage=e=>{
    let m;try{m=JSON.parse(e.data);}catch{return;}
    const s=m.sender||'someone';
    if(m.event==='gift')onGift(s,m.giftName,m.coins,m.tier);
    else if(m.event==='like')onLike(s);
    else if(m.event==='comment')onComment(s,m.comment||'');
    else if(m.event==='follow')onFollow(s);
    else if(m.event==='share')onShare(s);
    else if(m.event==='connected'){
      document.getElementById('tt-status').classList.add('live');
      document.getElementById('tt-label').textContent='LIVE: '+m.username;
      addComment('system','Connected to TikTok Live! 🔴','#f06');
    }else if(m.event==='disconnected'){
      document.getElementById('tt-status').classList.remove('live');
      document.getElementById('tt-label').textContent='TikTok: reconnecting...';
    }
  };
  ws.onclose=()=>{document.getElementById('tt-status').classList.remove('live');wsD=Math.min(wsD*1.5,30000);setTimeout(connectWS,wsD);};
  ws.onerror=()=>{};
}
connectWS();

setTimeout(()=>addComment('TikFan99','@big_sam34 is insane!','#f9a'),1000);
